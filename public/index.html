<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced RAG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="app-header">
            <div>
                <h1>Advanced RAG</h1>
                <p>Ask a question based on the course materials.</p>
            </div>
            <div id="user-button"></div>
        </header>

        <section id="auth-section" class="auth-section">
            <div id="auth-container"></div>
        </section>

        <section id="chat-section" class="chat-section" style="display: none;">
            <div id="results-container" class="results-container">
                <div class="placeholder-text">Your answer will appear here...</div>
            </div>

            <form id="ask-form" class="ask-form">
                <input type="text" id="question-input" placeholder="What is mobile development?" required autocomplete="off">
                <button type="submit" id="submit-btn">Ask</button>
            </form>
        </section>
    </main>

    <!-- Initialize Clerk SDK -->
    <script
      async
      crossorigin="anonymous"
      data-clerk-publishable-key="pk_test_ZmFjdHVhbC1kaW5nby03Mi5jbGVyay5hY2NvdW50cy5kZXYk"
      src="https://factual-dingo-72.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
      type="text/javascript"
    ></script>

    <script src="app.js"></script>
</body>
</html>
